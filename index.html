<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raft Multiplayer Servers</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;overflow:hidden;background:#0b5fa5;font-family:Arial;}
canvas{display:block;}
#menu{
position:fixed;top:0;left:0;right:0;
background:white;padding:10px;z-index:10;
}
</style>
</head>

<body>

<div id="menu">
Room:
<input id="roomInput" value="lobby">
<button onclick="joinRoom()">Join Server</button>
</div>

<canvas id="game"></canvas>

<script>
// 🔵 SUPABASE
const supabase = window.supabase.createClient(
"https://rzibpfluyuwwpzvsawqa.supabase.co",
"sb_publishable_Bg5ytpJ1cHAdGgmXaYtMJA_ucsK7T9Y"
);

const playerId = crypto.randomUUID();
let currentRoom = "lobby";

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

let player={
x:0,y:0,
color:"#"+Math.floor(Math.random()*16777215).toString(16)
};

let keys={};
let players={};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function joinRoom(){
currentRoom=document.getElementById("roomInput").value;
}

// 📤 Skicka data
async function updatePlayer(){
await supabase.from("players").upsert({
id:playerId,
room:currentRoom,
x:player.x,
y:player.y,
color:player.color
});
}

setInterval(updatePlayer,200);

// 📥 Hämta bara spelare i samma room
async function loadPlayers(){
let {data}=await supabase
.from("players")
.select("*")
.eq("room",currentRoom);

players={};
data.forEach(p=>{
if(p.id!==playerId){
players[p.id]=p;
}
});
}

setInterval(loadPlayers,500);

function update(){
if(keys["w"])player.y-=3;
if(keys["s"])player.y+=3;
if(keys["a"])player.x-=3;
if(keys["d"])player.x+=3;
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

// Draw others
for(let id in players){
let p=players[id];
ctx.fillStyle=p.color;
ctx.fillRect(p.x,p.y,20,20);
}

// Draw self
ctx.fillStyle=player.color;
ctx.fillRect(player.x,player.y,20,20);
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
